<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="64" height="32" rx="0" fill="url(#shine)"/>
  <!-- Open book icon, centered -->
  <!-- Left page -->
  <path d="M14 18 C14 18 20 17 28 20 L28 46 C20 43 14 44 14 44 Z" fill="white" opacity="0.9"/>
  <!-- Right page -->
  <path d="M50 18 C50 18 44 17 36 20 L36 46 C44 43 50 44 50 44 Z" fill="white" opacity="0.9"/>
  <!-- Spine -->
  <rect x="30" y="18" width="4" height="28" rx="2" fill="white" opacity="0.5"/>
  <!-- Lines on left page -->
  <line x1="17" y1="27" x2="26" y2="26" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="31" x2="26" y2="30" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="35" x2="26" y2="34" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lines on right page -->
  <line x1="47" y1="27" x2="38" y2="26" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="31" x2="38" y2="30" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="35" x2="38" y2="34" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
</svg>
